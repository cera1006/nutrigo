<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Chat Nutricional | NutriGo</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <h1>Plan Nutricional</h1>
    <nav>
      <a href="index.html">Home</a>
      <a href="chatbot.html">Nogu</a>
      <a href="contacto.html">Contacto</a>
    </nav>
  </header>


  <main class="card">
    <h2>Chat con Nugo 🦦</h2>

    <!-- Botón para reiniciar -->
    <button onclick="reiniciarChat()" style="margin-bottom:10px;">
      🔄 Reiniciar chat
    </button>

    <!-- Chat -->
    <div id="chat" class="chat-box">
      <div class="message bot">
        <strong>Nugo 🦦:</strong><br>
        ¡Hola! 👋 Soy Nugo la nutria, tu guía en NutriGo 🥗<br>
        ¿Te gustaría comenzar tu análisis nutricional?
      </div>
    </div>

    <input type="text" id="userInput" placeholder="Escribe aquí tu respuesta..." />
    <button onclick="sendMessage()">Enviar</button>
  </main>

  <script src="chatbot.js"></script>
</body>
</html>
